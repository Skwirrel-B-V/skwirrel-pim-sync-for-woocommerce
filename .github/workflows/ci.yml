name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests + Static Analysis + Code Style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run unit tests (Pest)
        run: vendor/bin/pest --testsuite=Unit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

      - name: Run PHPCS
        run: vendor/bin/phpcs

  plugin-check:
    name: WordPress.org Plugin Check
    runs-on: ubuntu-latest
    # Non-blocking initially — WP.org will start scanning submissions and
    # emailing on failure, so we want the findings visible in CI early.
    # Flip to required once the first report is clean.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./plugin/skwirrel-pim-sync
